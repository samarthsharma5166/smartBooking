name: Deploy Node.js Application to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.0.3
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          envs: PRODUCTION_ENV
          script: |
            cd ~/smartBooking

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            
            # Show latest commit to confirm new code was pulled
            echo "=== Latest commit ==="
            git log --oneline -3

            # Securely write the environment variables to the backend's .env file
            echo "$PRODUCTION_ENV" > backend/.env

            # Rebuild and restart backend (--force-recreate ensures new image is used)
            cd ~/smartBooking/backend
            docker compose up -d --build --force-recreate

            # Rebuild and restart frontend
            cd ~/smartBooking/frontend
            docker compose up -d --build --force-recreate

            # Clean up dangling images
            docker image prune -f
            
            echo "=== Deployment complete ==="