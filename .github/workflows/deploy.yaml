name: Deploy Node.js Application to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.0.3
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          envs: PRODUCTION_ENV
          script: |
            cd ~/smartBooking
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            
            # Securely write the environment variables to the backend's .env file
            echo "$PRODUCTION_ENV" > backend/.env
            
            # Rebuild and restart the containers (--no-cache forces full rebuild, --force-recreate applies new env)
            cd ~/smartBooking/backend
            docker compose build --no-cache
            docker compose up -d --force-recreate
            
            cd ~/smartBooking/frontend
            docker compose build --no-cache
            docker compose up -d --force-recreate